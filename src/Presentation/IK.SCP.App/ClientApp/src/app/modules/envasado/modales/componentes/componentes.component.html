
<div class="p-4">

    <div class="p-fluid grid mb-2" [formGroup]="form">

        <div class="field col-6">
            <span class="p-float-label">
                <input type="text" pInputText formControlName="componente" />
                <label for="dropdown">Componente</label>
            </span>
        </div>
        <div class="field col-6">
            <span class="p-float-label">
                <input type="text" pInputText formControlName="lote" />
                <label for="dropdown">Lote</label>
            </span>
        </div>
        <div class="field col-4">
            <span class="p-float-label">
                <p-inputNumber mode="decimal" [maxFractionDigits]="2"
                    locale="en-US"
                    formControlName="humedad"
                ></p-inputNumber>
                <label for="dropdown">% Humedad</label>
            </span>
        </div>
        <div class="col-4 d-flex align-items-center mb-3 justify-content-center">
            <span>Evaluación Sensorial</span>    
        </div>
        <div class="field col-4">
            <!-- <p-checkbox label="Evaluación Sensorial" [binary]="true"
                formControlName="evaluacionSensorial"
            ></p-checkbox> -->
            <p-selectButton [options]="valores" formControlName="evaluacionSensorial"
                optionLabel="texto" optionValue="valor"
            ></p-selectButton>
        </div>
        <div class="col-12">
            <span class="p-float-label">
                <textarea rows="2" pInputTextarea formControlName="observacion"
                ></textarea>
                <label for="dropdown">Observación</label>
            </span>
        </div>
    </div>

</div>

<div class="ui-dialog-footer text-center pt-3">
    <button pButton label="Cerrar" icon="fa-solid fa-xmark" class="p-button-rounded p-button-danger me-3 px-5"
        (click)="cerrar()"
    ></button>
    <button pButton label="Agregar" icon="fa-solid fa-plus" class="p-button-rounded p-button-primary px-5"
        (click)="guardar()"
    ></button>
</div>
