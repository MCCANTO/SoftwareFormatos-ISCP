<app-titulo-pagina
  titulo="Panel de Control"
  (regresar)="goTo(0)"
  (regresarAnt)="goTo(1)"
  [mostrarBotonRegresar]="true"
></app-titulo-pagina>

<div class="d-flex mx-0 px-0 mb-5">

  <app-card-button *ngFor="let aplicacion of aplicaciones"
    [icono]="aplicacion.Icono"
    [texto]="aplicacion.Nombre"
    (click)="goTo(aplicacion.NodoId)"
  ></app-card-button>

</div>

<div class="row">

  <div class="col-md-6" *ngIf="mostrarBlending">
    <app-tarjeta-seccion
      icono="fa fa-check-to-slot"
      titulo="Blending - Checklist"
      [contentTemplate]="contentTemplate_2"
    >
      <ng-template #contentTemplate_2>
        <p-table [value]="arranques_blending" styleClass="p-datatable-sm">
          <ng-template pTemplate="header">
            <tr>
              <th></th>
              <th class="fw-semibold">Usuario</th>
              <th class="fw-semibold text-center">Fecha</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-arranque>
            <tr>
              <td class="text-center">
                <button
                  pButton
                  pRipple
                  type="button"
                  icon="fa-solid fa-magnifying-glass fa-xl"
                  class="p-button-rounded p-button-success p-button-text"
                  (click)="verBlendingArranque(arranque.Id)"
                ></button>
              </td>
              <td>{{ arranque.Usuario }}</td>
              <td class="text-center">
                {{ arranque.Fecha | date : "dd/MM/yyyy HH:mm" }}
              </td>
            </tr>
          </ng-template>
        </p-table>
      </ng-template>
    </app-tarjeta-seccion>
  </div>

  <div class="col-md-6">
    <app-tarjeta-seccion
      icono="fa-solid fa-check-to-slot"
      titulo="Arranques de Máquina"
      [contentTemplate]="contentTemplate_1"
    >
      <ng-template #contentTemplate_1>
        <p-table [value]="arranques_maquina" styleClass="p-datatable-sm">
          <ng-template pTemplate="header">
            <tr>
              <th></th>
              <th class="fw-semibold">Usuario</th>
              <th class="fw-semibold text-center">Fecha Registro</th>
              <th class="fw-semibold text-center">Fecha Últ. Modif.</th>
              <th class="fw-semibold text-center"> Impresión</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-arranque>
            <tr>
              <td class="text-center">
                <button pButton
                        pRipple
                        type="button"
                        icon="fa-solid fa-magnifying-glass fa-xl"
                        class="p-button-rounded p-button-success p-button-text"
                        (click)="verArranqueMaquina(arranque.arranqueMaquinaId)"></button>
              </td>
              <td>{{ arranque.usuarioCreacion }}</td>
              <td class="text-center">
                {{ arranque.fechaCreacion | date : "dd/MM/yyyy HH:mm" }}
              </td>
              <td class="text-center">
                {{ arranque.fechaModificacion | date : "dd/MM/yyyy HH:mm" }}
              </td>
              <td class="text-center">
                <button pButton
                        pRipple
                        type="button"
                        icon="fa-solid fa-print fa-xl"
                        class="p-button-rounded p-button-success p-button-text"
                        (click)="createPDF(arranque.arranqueMaquinaId)"></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </ng-template>
    </app-tarjeta-seccion>
  </div>
  
</div>



<p-toast position="top-right"></p-toast>
<p-confirmDialog
  header="Confirmación"
  icon="pi pi-exclamation-triangle"
  [style]="{ width: '30vw' }"
  acceptButtonStyleClass="p-button-warning"
  rejectButtonStyleClass="p-button-outlined"
  acceptLabel="Sí"
></p-confirmDialog>
