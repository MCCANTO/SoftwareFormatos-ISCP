<div class="container" [formGroup]="form">
  <div class="mb-3 row">
    <label class="col-md-4 col-form-label">Peso (g)</label>
    <div class="col-md-4 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="peso"
        (onKeyUp)="calcularPorcentaje()"
      ></p-inputNumber>
    </div>
  </div>
  <div class="mb-3 row">
    <label class="col-md-4 col-form-label">Pedacería (g)</label>
    <div class="col-md-4 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="pedaceria"
        (onKeyUp)="calcularPorcentaje()"
      ></p-inputNumber>
    </div>
    <label class="col-md-1 col-form-label text-end">%</label>
    <div class="col-md-3 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="porcentajePedaceria"
      ></p-inputNumber>
    </div>
  </div>
  <div class="mb-3 row">
    <label class="col-md-4 col-form-label">Hojuelas enteras (g)</label>
    <div class="col-md-4 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="hojuelasEnteras"
      ></p-inputNumber>
    </div>
    <label class="col-md-1 col-form-label text-end">%</label>
    <div class="col-md-3 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="porcentajeHojuelasEnteras"
      ></p-inputNumber>
    </div>
  </div>
  <div class="mb-3 row">
    <label class="col-md-4 col-form-label">Inspector</label>
    <div class="col-md-8 p-fluid">
      <input type="text" pInputText formControlName="inspector" />
    </div>
  </div>
  <div class="mb-3 row">
    <label class="col-md-4 col-form-label">Observación</label>
    <div class="col-md-8 p-fluid">
      <textarea
        rows="2"
        pInputTextarea
        formControlName="observacion"
      ></textarea>
    </div>
  </div>
</div>

<div class="ui-dialog-footer text-center pt-3">
  <button
    pButton
    label="Cerrar"
    icon="fa fa-xmark"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    label="Guardar"
    icon="fa fa-save"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
  ></button>
</div>
