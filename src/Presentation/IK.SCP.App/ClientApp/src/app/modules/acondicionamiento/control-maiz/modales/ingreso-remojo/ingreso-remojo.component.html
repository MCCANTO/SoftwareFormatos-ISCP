<div class="container" [formGroup]="form">
  <div class="row mt-2 mb-3 align-items-center">
    <div class="col-md-3" col-form-label>N° Tanque</div>
    <div class="col-auto">
      <p-selectButton
        [options]="tanques"
        optionLabel="nombre"
        optionValue="id"
        formControlName="numeroTanque"
      ></p-selectButton>
    </div>
  </div>

  <div class="row mt-2 mb-3 align-items-center">
    <label class="col-md-3 col-form-label"> ph de agua</label>
    <label class="col-md-1 col-form-label text-start"> Antes </label>
    <div class="col-md-3 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        [useGrouping]="false"
        formControlName="phAntes"
      ></p-inputNumber>
    </div>
    <label class="col-md-2 col-form-label text-end" *ngIf="esEdicion">
      Después
    </label>
    <div class="col-md-3 p-fluid" *ngIf="esEdicion">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        [useGrouping]="false"
        formControlName="phDespues"
      ></p-inputNumber>
    </div>
  </div>
  <div class="row mt-2 mb-3 align-items-center" *ngIf="esEdicion">
    <div class="col-md-3">Olor</div>
    <div class="col-md-8">
      <p-selectButton
        [options]="olores"
        optionLabel="nombre"
        optionValue="id"
        formControlName="olor"
      ></p-selectButton>
    </div>
  </div>
  <div class="row mt-2 mb-3 align-items-center">
    <label class="col-md-3 col-form-label"> Agitación </label>
    <label class="col-md-1 col-form-label text-start"> Inicio </label>
    <div class="col-md-5 p-fluid">
      <p-calendar
        formControlName="inicioAgitacion"
        dateFormat="dd/mm/yy"
        appendTo="body"
        [showTime]="true"
        [showIcon]="true"
        dataType="string"
      ></p-calendar>
    </div>
  </div>
  <div class="row mt-2 mb-3 align-items-center">
    <label class="col-md-3 col-form-label"> </label>
    <label class="col-md-1 col-form-label text-start"> Fin </label>
    <div class="col-md-5 p-fluid">
      <p-calendar
        formControlName="finAgitacion"
        dateFormat="dd/mm/yy"
        appendTo="body"
        [showTime]="true"
        [showIcon]="true"
        dataType="string"
      ></p-calendar>
    </div>
  </div>
  <div class="row mt-2 mb-3 align-items-center">
    <div class="col-md-3 col-form-label">Observación</div>
    <div class="col-md-9 p-fluid">
      <textarea
        pInputTextarea
        rows="2"
        formControlName="observacion"
      ></textarea>
    </div>
  </div>
</div>
<hr />
<div class="ui-dialog-footer text-center pt-3">
  <button
    pButton
    label="Cerrar"
    icon="fa-solid fa-xmark"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    [label]="esEdicion ? 'Guardar' : 'Agregar'"
    [icon]="esEdicion ? 'fa fa-save' : 'fa fa-plus'"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
  ></button>
</div>
