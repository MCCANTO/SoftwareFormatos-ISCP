<div class="container-fluid py-2">
  <app-custom-navbar
    subtitulo="Acondicionamiento"
    classSubtitulo="color-aco"
  ></app-custom-navbar>
  <div class="d-flex justify-content-between align-items-center">
    <div class="p-3">
      <p-button
        label="Bandeja de Órdenes"
        [styleClass]="
          'p-button-rounded texto-tab px-5 me-4 ' +
          (mostrarComponenteBandeja ? '' : 'p-button-secondary')
        "
        (onClick)="mostrarComponente(1)"
      ></p-button>
      <p-button
        label="Control y Monitoreo de Rayos X"
        [styleClass]="
          'p-button-rounded texto-tab px-5 me-4 ' +
          (mostrarComponenteRayosX ? '' : 'p-button-secondary')
        "
        (onClick)="mostrarComponente(2)"
      ></p-button>
    </div>
    <p-button
      label="Regresar"
      icon="fa fa-arrow-left"
      [styleClass]="'p-button-rounded p-button-warning px-5 me-4'"
      (onClick)="regresar()"
    ></p-button>
  </div>

  <div class="px-3 mt-3">
    <app-bandeja-orden *ngIf="mostrarComponenteBandeja"></app-bandeja-orden>

    <app-control-rayos-x *ngIf="mostrarComponenteRayosX"></app-control-rayos-x>
  </div>
</div>
<p-toast position="top-right"></p-toast>
<p-confirmDialog
  header="Confirmación"
  [style]="{ width: '30vw' }"
  acceptButtonStyleClass="p-button-warning"
  rejectButtonStyleClass="p-button-outlined"
  acceptLabel="Sí"
></p-confirmDialog>
