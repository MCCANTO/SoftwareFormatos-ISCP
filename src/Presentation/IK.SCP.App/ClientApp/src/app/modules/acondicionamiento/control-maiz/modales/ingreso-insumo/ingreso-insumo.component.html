<div class="container" [formGroup]="form">
  <div class="row mb-3">
    <label class="col-md-4 col-form-label"> Insumo </label>
    <div class="col-md-8 p-fluid">
      <input type="text" pInputText formControlName="insumo" />
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-md-4 col-form-label"> Lote </label>
    <div class="col-md-8 p-fluid">
      <input type="text" pInputText formControlName="lote" />
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-md-4 col-form-label"> Inicio (kg) </label>
    <div class="col-md-8 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="inicio"
        [useGrouping]="false"
        (onKeyUp)="calcularConsumo()"
      ></p-inputNumber>
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-md-4 col-form-label"> Fin (kg) </label>
    <div class="col-md-8 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="fin"
        [useGrouping]="false"
        (onKeyUp)="calcularConsumo()"
      ></p-inputNumber>
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-md-4 col-form-label"> Consumo (kg) </label>
    <div class="col-md-8 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        [useGrouping]="false"
        formControlName="consumo"
      ></p-inputNumber>
    </div>
  </div>
</div>

<hr />
<div class="ui-dialog-footer text-center pt-3">
  <button
    pButton
    label="Cerrar"
    icon="fa-solid fa-xmark"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    label="Agregar"
    icon="fa-solid fa-plus"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
  ></button>
</div>
