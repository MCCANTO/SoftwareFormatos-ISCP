<app-tarjeta-seccion
  icono="fa fa-caret-right"
  titulo="Insumos"
  [headerTemplate]="headerTemplate_1"
  [contentTemplate]="contentTemplate_1"
>
  <ng-template #headerTemplate_1>
    <button
      pButton
      label="Agregar"
      icon="fa-solid fa-plus"
      class="p-button-rounded p-button-primary px-4"
      (click)="agregar()"
    ></button>
  </ng-template>
  <ng-template #contentTemplate_1>
    <p-table
      [value]="insumos"
      styleClass="p-datatable-sm app-table p-datatable-gridlines"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>INSUMO</th>
          <th>lote</th>
          <th class="text-center">INICIO (KG)</th>
          <th class="text-center">FINAL (KG)</th>
          <th class="text-center">CONSUMO (KG)</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td>{{ item.insumo }}</td>
          <td>{{ item.lote }}</td>
          <td class="text-center">
            {{ item.cantidadInicio | number :"0.2-2": "en" }}
          </td>
          <td class="text-center">
            <span *ngIf="item.cantidadFinal">
              {{ item.cantidadFinal | number  : "0.2-2": "en" }}
            </span>
            <button
              *ngIf="!item.cantidadFinal"
              pButton
              pRipple
              type="button"
              icon="fa fa-edit fa-xl"
              class="p-button-rounded p-button-success"
              (click)="editar(item)"
            ></button>
          </td>
          <td class="text-center">
            {{
              item.cantidadInicio - item.cantidadFinal | number  : "0.2-2" : "en"
            }}
          </td>
        </tr>
      </ng-template>
    </p-table>
  </ng-template>
</app-tarjeta-seccion>
