<p-table [value]="fuerzasCorte" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
    <tr>
      <th class="text-center">item</th>
      <th class="text-center">control (sin pef)</th>
      <th class="text-center">pef</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td class="text-center">{{ item.item }}</td>
      <td>
        <p-inputNumber
          mode="decimal"
          locale="en-US"
          [maxFractionDigits]="2"
          [(ngModel)]="item.controlSinPef"
          [disabled]="!esEditable"
          [useGrouping]="false"
        >
        </p-inputNumber>
      </td>
      <td>
        <p-inputNumber
          mode="decimal"
          locale="en-US"
          [maxFractionDigits]="2"
          [(ngModel)]="item.pef"
          [disabled]="!esEditable"
          [useGrouping]="false"
        >
        </p-inputNumber>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="footer" let-item>
    <tr>
      <td>PROMEDIO</td>
      <td class="text-center">{{calculoPromedioSinPef() | number : "0.2-2" : "en"}}</td>
      <td class="text-center">{{calculoPromedioPef() | number : "0.2-2" : "en"}}</td>
    </tr>
    <tr>
      <td>% REDUCCIÓN</td>
      <td></td>
      <td class="text-center">{{calculoPorcentajePef() | number : "0.2-2" : "en"}} %</td>
    </tr>
  </ng-template>
</p-table>

<div class="p-dialog-footer text-center">
  <button
    pButton
    label="Cerrar"
    icon="fa fa-xmark"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    label="Guardar"
    icon="fa fa-save"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
    *ngIf="esEditable"
    [disabled]="existenControlesVacios || existenPefsVacios"
  ></button>
</div>
