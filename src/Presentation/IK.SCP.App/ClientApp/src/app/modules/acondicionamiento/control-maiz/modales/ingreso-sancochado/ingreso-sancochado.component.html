<div class="container" [formGroup]="form">
  <div class="row mt-2 mb-3 align-items-center">
    <div class="col-md-3">N° Batch</div>
    <div class="col-md-3 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="0"
        formControlName="numeroBatch"
      ></p-inputNumber>
    </div>
  </div>
  <div class="row mt-2 mb-3 align-items-center">
    <div class="col-auto">Viene de Tanque N°</div>
    <div class="col-md-4">
      <p-selectButton
        [options]="tanques"
        optionLabel="nombre"
        optionValue="id"
        formControlName="numeroTanque"
      ></p-selectButton>
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-md-3 col-form-label"> Temperatura (°C) </label>
    <label class="col-md-1 col-form-label"> Inicio </label>
    <div class="col-md-3 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        [useGrouping]="false"
        formControlName="temperaturaInicio"
      ></p-inputNumber>
    </div>
    <label class="col-md-1 col-form-label" *ngIf="esEdicion"> Fin </label>
    <div class="col-md-3 p-fluid" *ngIf="esEdicion">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        [useGrouping]="false"
        formControlName="temperaturaFin"
      ></p-inputNumber>
    </div>
  </div>
  <div class="row mb-3">
    <label class="col-md-3 col-form-label"> Observación </label>
    <div class="col-md-9 p-fluid">
      <textarea
        pInputTextarea
        rows="2"
        formControlName="observacion"
      ></textarea>
    </div>
  </div>
</div>

<hr />
<div class="ui-dialog-footer text-center pt-3">
  <button
    pButton
    label="Cancelar"
    icon="fa fa-times"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    [label]="esEdicion ? 'Guardar' : 'Agregar'"
    [icon]="esEdicion ? 'fa fa-save' : 'fa fa-plus'"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
  ></button>
</div>
