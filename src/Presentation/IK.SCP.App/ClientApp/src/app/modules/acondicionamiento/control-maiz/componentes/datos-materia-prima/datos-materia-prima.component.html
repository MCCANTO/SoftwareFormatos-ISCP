<app-tarjeta-seccion
  icono="fa fa-caret-right"
  titulo="Materia Prima"
  [headerTemplate]="headerTemplate_1"
  [contentTemplate]="contentTemplate_1"
>
  <ng-template #headerTemplate_1>
    <button
      pButton
      label="Agregar"
      icon="fa-solid fa-plus"
      class="p-button-rounded p-button-primary px-4"
      (click)="agregar()"
    ></button>
  </ng-template>
  <ng-template #contentTemplate_1>
    <p-table
      [value]="materias"
      styleClass="p-datatable-sm app-table p-datatable-gridlines"
    >
      <ng-template pTemplate="header">
        <tr>
          <!-- <th style="width: 50%">MATERIA PRIMA</th> -->
          <th>CALIDAD</th>
          <th class="text-center">CANTIDAD (KG)</th>
          <th>LOTE</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <!-- <td></td> -->
          <td>{{ item.calidad }}</td>
          <td class="text-center">{{ item.cantidad }}</td>
          <td>{{ item.lote }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="footer">
        <tr>
          <th class="text-end">Total MP (KG)</th>
          <th class="text-center">
            {{ calcularPesoTotal() }}
          </th>
          <th></th>
        </tr>
      </ng-template>
    </p-table>
  </ng-template>
</app-tarjeta-seccion>
