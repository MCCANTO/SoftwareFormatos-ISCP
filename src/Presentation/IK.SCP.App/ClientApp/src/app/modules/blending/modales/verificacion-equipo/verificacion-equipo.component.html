<p-table [value]="verificaciones" [sortOrder]="1">
  <ng-template pTemplate="header">
    <tr>
      <th></th>
      <th class="fw-semibold text-center">Operativo</th>
      <th class="fw-semibold text-center">Limpio</th>
      <th class="fw-semibold text-center">Observaciones</th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-variable
    let-rowIndex="rowIndex"
    let-rowgroup="rowgroup"
    let-rowspan="rowspan"
  >
    <tr>
      <td>
        {{ variable.nombre }}
      </td>
      <td class="text-center" style="width: 25%">
        <p-selectButton
          [options]="calificaciones"
          optionLabel="texto"
          optionValue="valor"
          [(ngModel)]="variable.operativo"
          [disabled]="variable.cerrado"
        ></p-selectButton>
      </td>
      <td class="text-center" style="width: 25%">
        <p-selectButton
          [options]="calificaciones"
          optionLabel="texto"
          optionValue="valor"
          [(ngModel)]="variable.limpio"
          [disabled]="variable.cerrado"
        ></p-selectButton>
      </td>
      <td class="p-fluid" style="width: 250px">
        <textarea
          pInputTextarea
          [(ngModel)]="variable.observacion"
          [rows]="1"
          [disabled]="variable.cerrado"
        ></textarea>
      </td>
    </tr>
  </ng-template>
</p-table>

<div class="ui-dialog-footer text-center pt-3">
  <button
    pButton
    label="Cerrar"
    icon="fa-solid fa-xmark"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    label="Agregar"
    icon="fa-solid fa-plus"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
  ></button>
</div>
