<div class="container" [formGroup]="form">
  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Línea</label>
    <div class="col-md-4 p-fluid">
      <p-dropdown
        [options]="freidoras"
        formControlName="lineaId"
        optionValue="Id"
        optionLabel="Nombre"
      ></p-dropdown>
    </div>
    <label class="col-md-2 col-form-label" *ngIf="mostrarOrden">Orden</label>
    <div class="col-md-4 p-fluid" *ngIf="mostrarOrden">
      <input type="text" pInputText formControlName="ordenId" />
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Producto</label>
    <div class="col-md-10 p-fluid">
      <input type="text" pInputText formControlName="producto" />
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Sal/Sabor</label>
    <div class="col-md-10 p-fluid">
      <input type="text" pInputText formControlName="otroSabor" />
    </div>
  </div>
  <p-divider></p-divider>
  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Etapa</label>
    <div class="col-md-4 p-fluid">
      <input type="text" pInputText formControlName="etapa" />
    </div>
    <label class="col-md-2 col-form-label">Aceite</label>
    <div class="col-md-4 p-fluid">
      <input type="text" pInputText formControlName="aceite" />
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-3 col-form-label">Inicio de fuente</label>
    <div class="col-md-9 p-fluid">
      <input type="text" pInputText formControlName="inicioFuente" />
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-3 col-form-label">Relleno de fritura</label>
    <div class="col-md-9 p-fluid">
      <input type="text" pInputText formControlName="rellenoFuente" />
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">AGL</label>
    <div class="col-md-4 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="agl"
        [useGrouping]="false"
      ></p-inputNumber>
    </div>
    <label class="col-md-2 col-form-label">CP</label>
    <div class="col-md-4 p-fluid">
      <p-inputNumber
        mode="decimal"
        locale="en-US"
        [maxFractionDigits]="2"
        formControlName="cp"
        [useGrouping]="false"
      ></p-inputNumber>
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Color</label>
    <div class="col-md-6 p-fluid">
      <p-selectButton
        [options]="stateOptions"
        formControlName="color"
        optionLabel="label"
        optionValue="value"
      ></p-selectButton>
    </div>
  </div>

  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Olor</label>
    <div class="col-md-6 p-fluid">
      <p-selectButton
        [options]="stateOptions"
        formControlName="olor"
        optionLabel="label"
        optionValue="value"
      ></p-selectButton>
    </div>
  </div>
  <p-divider></p-divider>
  <div class="mb-3 row">
    <label class="col-md-2 col-form-label">Observación</label>
    <div class="col-md-10 p-fluid">
      <textarea
        rows="3"
        pInputTextarea
        formControlName="observacion"
      ></textarea>
    </div>
  </div>
</div>

<div class="ui-dialog-footer text-center pt-3">
  <button
    pButton
    label="Cerrar"
    icon="fa-solid fa-xmark"
    class="p-button-rounded p-button-danger me-3 px-5"
    (click)="cerrar()"
  ></button>
  <button
    pButton
    label="Agregar"
    icon="fa-solid fa-plus"
    class="p-button-rounded p-button-primary px-5"
    (click)="guardar()"
  ></button>
</div>
