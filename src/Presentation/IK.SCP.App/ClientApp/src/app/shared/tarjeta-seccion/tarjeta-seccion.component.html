<div class="card border-0 rounded-4 shadow-sm mb-3 h-100">
  <div class="card-body">
    <div class="card-title mb-5" *ngIf="titulo || headerTemplate">
      <div class="d-flex align-items-center justify-content-between">
        <span><i *ngIf="icono" [class]="icono"></i> {{ titulo }}</span>
        <ng-content select=".after-title"></ng-content>
        <div>
          <ng-container
            *ngTemplateOutlet="headerTemplate ? headerTemplate : header"
          ></ng-container>
        </div>
      </div>
    </div>
    <ng-template #content></ng-template>
    <ng-template #header></ng-template>
    <ng-container
      *ngTemplateOutlet="contentTemplate ? contentTemplate : content"
    ></ng-container>
  </div>
</div>
