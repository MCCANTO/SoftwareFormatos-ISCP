<div class="container-fluid py-2">
  <app-custom-navbar
    subtitulo="Sazonado"
    [headerTemplate]="headerTemplate"
    classSubtitulo="color-saz"
  >
    <ng-template #headerTemplate>
      <span class="navbar-text me-5 pointer">
        <strong
          ><i class="fa fa-boxes-packing"></i>
          {{ sazonadorData.sazonador.codigo }} -
          {{ sazonadorData.sazonador.nombre }}
        </strong>
      </span>
    </ng-template>
  </app-custom-navbar>

  <div class="mt-3 mx-1">
    <router-outlet></router-outlet>
  </div>
</div>
