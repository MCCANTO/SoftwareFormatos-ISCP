<p-table [value]="condiciones" styleClass="p-datatable-sm app-table">
  <ng-template pTemplate="header">
    <tr>
      <th>Descripción</th>
      <th class="fw-semibold text-center" style="width: 60px !important">
        No / Sí
      </th>
      <th style="width: 40%">observación</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-condicion>
    <tr>
      <td>
        {{ condicion.orden }}.- {{ condicion.nombre }}
        <span *ngIf="condicion.comentario" (click)="op.toggle($event)">
          <i class="fa-solid fa-circle-question fa-xl pointer"></i>
        </span>

        <p-overlayPanel #op>
          <ng-template pTemplate>
            <div style="max-width: 250px" class="text-justify">
              <i>{{ condicion.comentario }}</i>
            </div>
          </ng-template>
        </p-overlayPanel>
      </td>
      <td class="text-center" style="width: 80px">
        <p-inputSwitch
          [(ngModel)]="condicion.valor"
          [disabled]="condicion.fechaModificacion"
        ></p-inputSwitch>
      </td>
      <td class="p-fluid">
        <!-- <input type="text" pInputText /> -->
        <textarea
          pInputTextarea
          [(ngModel)]="condicion.observacion"
          [rows]="1"
          [disabled]="condicion.fechaModificacion"
        ></textarea>
      </td>
    </tr>
  </ng-template>
</p-table>
