<p-table [value]="verificaciones" styleClass="p-datatable-sm">
  <ng-template pTemplate="header">
      <tr>
          <th></th>
          <th>Fecha Hora</th>
          <th>Finalizado</th>
      </tr>
  </ng-template>
  <ng-template pTemplate="body" let-variable>
      <tr>
          <td class="text-center">
              <button pButton pRipple type="button"
              icon="fa-solid fa-magnifying-glass fa-xl"
              class="p-button-rounded p-button-success p-button-text"
              ></button>
          </td>
          <td class="text-center">{{variable.FechaCreacion | date: 'dd/MM/yyyy HH:mm'}}</td>
          <td class="text-center">
            <i *ngIf="variable.Cerrado" class="fa-solid fa-check fa-xl text-success"></i>
          </td>
      </tr>
  </ng-template>
</p-table>
